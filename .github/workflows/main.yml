name: Full-year calendar

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest

    steps:
      - name: Generate Metrics
        uses: lowlighter/metrics@latest
        with:
          # This line actually hands your secret token to the action:
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Modern replacement for 'svg_out_path' (outputs to root directory by default)
          filename: metrics.plugin.isocalendar.fullyear.svg
          
          # Enables the specific full-year calendar plugin you want
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: Deploy to GitHub Pages Branch
        uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: . # Changed from 'dist' to '.' because the action saves the file to the root directory now
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
